name: سكرابر المتاجر الصعبة (Chrome حقيقي)

on:
  schedule:
    - cron: "0 9,21 * * *" # ١٢ ظهرًا و١٢ ليلًا بتوقيت السعودية (UTC+3)
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write # لالتزام لقطة browser-cache.json إلى المستودع
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: oroudi-server/package-lock.json

      - name: تثبيت الحزم
        working-directory: oroudi-server
        run: npm ci

      - name: تثبيت Chrome حقيقي + شاشة وهمية (xvfb)
        working-directory: oroudi-server
        run: |
          npx playwright install --with-deps chrome
          sudo apt-get install -y xvfb

      - name: تشغيل السكرابر
        working-directory: oroudi-server
        env:
          ADMIN_TOKEN: ${{ secrets.OROUDI_ADMIN_TOKEN }}
          OROUDI_SERVER: https://oroudi-server.onrender.com
        # xvfb-run يوفّر شاشة وهمية للمتصفح المتخفّي (لولو) غير-headless
        run: xvfb-run -a node scrape-hard-stores.js

      - name: التزام اللقطة الدائمة (browser-cache.json)
        # يجلبها الخادم من GitHub raw عند الإقلاع فيتعافى من مسح قرص Render
        run: |
          git config user.name "oroudi-scraper[bot]"
          git config user.email "scraper@users.noreply.github.com"
          git add oroudi-server/browser-cache.json
          if git diff --cached --quiet; then
            echo "لا تغيير في اللقطة"
          else
            git commit -m "تحديث لقطة أسعار متاجر المتصفح [skip ci]"
            git push
          fi

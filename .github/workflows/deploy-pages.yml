name: نشر الموقع على GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "marker-app/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: marker-app/package-lock.json

      - name: تثبيت الحزم
        working-directory: marker-app
        run: npm ci

      - name: بناء نسخة الويب
        working-directory: marker-app
        run: npx expo export --platform web --output-dir dist

      - name: تصحيح المسارات لتعمل تحت /oroudi/
        working-directory: marker-app/dist
        run: |
          touch .nojekyll
          find . -type f \( -name "*.html" -o -name "*.js" \) -print0 | xargs -0 sed -i \
            -e 's#href="/favicon.ico"#href="favicon.ico"#g' \
            -e 's#src="/_expo/#src="_expo/#g' \
            -e 's#"/_expo/#"_expo/#g' \
            -e 's#"/assets/#"assets/#g'

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: marker-app/dist

      - id: deployment
        uses: actions/deploy-pages@v4

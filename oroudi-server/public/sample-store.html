<!doctype html>
<!-- صفحة متجر تجريبية لاختبار نمط HTML في محرك السكرابر.
     جرّبها من اللوحة بإعدادات:
     {
       "type": "html",
       "search_url": "http://localhost:4000/sample-store.html?q={q}",
       "item_selector": ".product-card",
       "fields": {
         "name":  { "sel": ".title" },
         "price": { "sel": ".price" },
         "original_price": { "sel": ".old-price" },
         "image": { "sel": "img", "attr": "src" },
         "url":   { "sel": "a", "attr": "href" },
         "brand": { "sel": ".brand" },
         "out_of_stock": { "sel": ".sold-out" }
       },
       "url_prefix": "http://localhost:4000"
     }
-->
<html lang="ar" dir="rtl">
<head><meta charset="utf-8"><title>متجر تجريبي</title></head>
<body>
  <div class="product-card">
    <a href="/p/halib-1l"><img src="https://example.com/img/milk.jpg" alt=""></a>
    <span class="brand">المراعي</span>
    <h3 class="title">حليب طويل الأجل ١ لتر</h3>
    <span class="old-price">7.50 ر.س</span>
    <span class="price">5.95 ر.س</span>
  </div>
  <div class="product-card">
    <a href="/p/arz-5kg"><img src="https://example.com/img/rice.jpg" alt=""></a>
    <span class="brand">أبو كاس</span>
    <h3 class="title">أرز بسمتي ٥ كيلو</h3>
    <span class="price">42.00 ر.س</span>
  </div>
  <div class="product-card">
    <a href="/p/zait-18l"><img src="https://example.com/img/oil.jpg" alt=""></a>
    <span class="brand">العربي</span>
    <h3 class="title">زيت دوار الشمس ١.٨ لتر</h3>
    <span class="price">19.95 ر.س</span>
    <span class="sold-out">غير متوفر</span>
  </div>
</body>
</html>

services:
  - type: web
    name: oroudi-server
    runtime: node
    plan: free
    rootDir: oroudi-server
    buildCommand: npm install && npx playwright install --with-deps chrome
    startCommand: node server.js
    envVars:
      - key: ADMIN_TOKEN
        generateValue: true
      - key: NODE_VERSION
        value: 20
